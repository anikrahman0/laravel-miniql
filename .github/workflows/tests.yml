name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - php: 8.1
            laravel: "^10.0"
          - php: 8.2
            laravel: "^10.0"
          - php: 8.2
            laravel: "^11.0"
          - php: 8.2
            laravel: "^12.0"
          - php: 8.3
            laravel: "^10.0"
          - php: 8.3
            laravel: "^11.0"
          - php: 8.3
            laravel: "^12.0"

    name: PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" \
                           "illuminate/database:${{ matrix.laravel }}" \
                           "illuminate/http:${{ matrix.laravel }}" \
                           "illuminate/routing:${{ matrix.laravel }}" \
                           "illuminate/cache:${{ matrix.laravel }}" \
                           "illuminate/console:${{ matrix.laravel }}" \
                           --no-interaction --no-update
          composer update --prefer-stable --no-interaction

      - name: Run tests
        run: ./vendor/bin/phpunit